name: Build FrpRecorder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEBRTC_URL: https://github.com/elesos/webrtc/blob/master/google-webrtc-1.0.32006.aar
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production  # 可选，不加也可以

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #  安装 Android SDK
      #- name: Set up Android SDK
      #  uses: android-actions/setup-android@v3
      #  with:
      #    api-level: 34
      #    build-tools: 34.0.0
      #    ndk: 26.1.10909185 # 可选

       # 设置 JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle


      - name: Download AAR from Release
        uses: robinraju/release-downloader@v1.12
        with:
          repository: "Tonykx2009/FrpRecorder"
          tag: "webrtc-1.0.32006"
          fileName: "google-webrtc-1.0.32006.aar"
          out-file-path: "app/libs"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # 检查 secret 是否为空
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ Error: KEYSTORE_BASE64 secret is empty!"
            echo "Please check that you have added the secret in GitHub Settings."
            exit 1
          fi

          # 显示前几个字符（用于调试，不会暴露完整密钥）
          echo "Secret length: ${#KEYSTORE_BASE64}"
          echo "First 20 chars: ${KEYSTORE_BASE64:0:20}"
    
          # 解码并保存
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
    
          # 验证文件是否生成成功
          if [ -f app/keystore.jks ]; then
            echo "✅ Keystore file created successfully"
            ls -lh app/keystore.jks
          else
            echo "❌ Failed to create keystore file"
            exit 1
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease


      # 上传最终可安装的签名包
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: WebRTCRecorder-Signed
          path: app/build/outputs/apk/release/*.apk

      - name: Clean up keystore
        if: always()
        run: rm -f keystore.jks

      - name: Delete workflow runs
       uses: Mattraks/delete-workflow-runs@v2
       with:
         token: ${{ secrets.GITHUB_TOKEN }}
         repository: ${{ github.repository }}
         retain_days: 2
         keep_minimum_runs: 6

      
